<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - StartupEvents</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;800&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/styles/design-system.css">
    <style>
        body {
            background: linear-gradient(135deg, #0f0f1e 0%, #1a1a2e 50%, #16213e 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 1rem;
            font-family: 'Inter', sans-serif;
        }

        .auth-container {
            width: 100%;
            max-width: 420px;
            background: rgba(15, 23, 42, 0.8);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 20px;
            padding: 2.5rem 2rem;
            backdrop-filter: blur(20px);
            box-shadow: 0 25px 50px rgba(0, 0, 0, 0.5);
        }

        .auth-header {
            text-align: center;
            margin-bottom: 2rem;
        }

        .auth-header h1 {
            font-size: 2rem;
            font-weight: 800;
            margin-bottom: 0.5rem;
            color: #f8fafc;
        }

        .auth-header h1 span {
            background: linear-gradient(135deg, #3b82f6 0%, #19b6f6 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .auth-header p {
            color: #94a3b8;
            font-size: 0.9rem;
        }

        .form-group {
            margin-bottom: 1.5rem;
        }

        .form-label {
            display: block;
            margin-bottom: 0.6rem;
            color: #f8fafc;
            font-weight: 600;
            font-size: 0.9rem;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .form-input {
            width: 100%;
            padding: 0.875rem 1rem;
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 10px;
            color: #f8fafc;
            font-size: 1rem;
            font-family: inherit;
            transition: all 0.3s ease;
        }

        .form-input::placeholder {
            color: #64748b;
        }

        .form-input:focus {
            outline: none;
            border-color: #3b82f6;
            background: rgba(255, 255, 255, 0.08);
            box-shadow: 0 0 0 3px rgba(59, 130, 246, 0.1);
        }

        .form-error {
            padding: 1rem;
            background: rgba(239, 68, 68, 0.1);
            border: 1px solid rgba(239, 68, 68, 0.3);
            border-radius: 8px;
            color: #fca5a5;
            font-size: 0.9rem;
            margin-bottom: 1.5rem;
            display: none;
        }

        .form-error.show {
            display: block;
        }

        .form-success {
            padding: 1rem;
            background: rgba(74, 222, 128, 0.1);
            border: 1px solid rgba(74, 222, 128, 0.3);
            border-radius: 8px;
            color: #86efac;
            font-size: 0.9rem;
            margin-bottom: 1.5rem;
            display: none;
        }

        .form-success.show {
            display: block;
        }

        .form-divider {
            display: none;
        }

        .form-divider.show {
            display: block;
            margin: 2rem 0;
            text-align: center;
            color: #64748b;
            font-size: 0.85rem;
        }

        .form-divider::before,
        .form-divider::after {
            content: '';
            display: inline-block;
            width: 40%;
            height: 1px;
            background: rgba(255, 255, 255, 0.1);
            vertical-align: middle;
            margin: 0 0.6rem;
        }

        .submit-btn {
            width: 100%;
            padding: 1rem;
            background: linear-gradient(135deg, #3b82f6 0%, #1d4ed8 100%);
            color: white;
            border: none;
            border-radius: 10px;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            box-shadow: 0 10px 25px rgba(59, 130, 246, 0.2);
        }

        .submit-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 15px 35px rgba(59, 130, 246, 0.3);
        }

        .submit-btn:active {
            transform: translateY(0);
        }

        .submit-btn:disabled {
            opacity: 0.6;
            cursor: not-allowed;
            transform: none;
        }

        .auth-toggle {
            text-align: center;
            margin-top: 1.5rem;
            color: #94a3b8;
            font-size: 0.9rem;
        }

        .auth-toggle a {
            color: #3b82f6;
            text-decoration: none;
            font-weight: 600;
            cursor: pointer;
            transition: color 0.3s ease;
        }

        .auth-toggle a:hover {
            color: #60a5fa;
        }

        .hidden {
            display: none;
        }

        @media (max-width: 480px) {
            .auth-container {
                padding: 2rem 1.5rem;
            }

            .auth-header h1 {
                font-size: 1.75rem;
            }

            .form-input {
                padding: 0.75rem 0.875rem;
                font-size: 16px;
            }
        }
    </style>
</head>
<body>
    <div class="auth-container">
        <!-- Header -->
        <div class="auth-header">
            <h1>Startup<span>Events</span></h1>
            <p id="authModeTitle">Sign in to your account</p>
        </div>

        <!-- Error/Success Messages -->
        <div class="form-error" id="authError"></div>
        <div class="form-success" id="authSuccess"></div>

        <!-- Login Form -->
        <form id="loginForm">
            <div class="form-group">
                <label class="form-label" for="loginEmail">Email</label>
                <input 
                    type="email" 
                    id="loginEmail" 
                    class="form-input" 
                    placeholder="your@email.com" 
                    required
                    autocomplete="email"
                >
            </div>

            <div class="form-group">
                <label class="form-label" for="loginPassword">Password</label>
                <input 
                    type="password" 
                    id="loginPassword" 
                    class="form-input" 
                    placeholder="Enter your password" 
                    required
                    autocomplete="current-password"
                >
            </div>

            <button type="submit" class="submit-btn">Sign In</button>
        </form>

        <!-- Signup Form -->
        <form id="signupForm" class="hidden">
            <div class="form-group">
                <label class="form-label" for="signupUsername">Username</label>
                <input 
                    type="text" 
                    id="signupUsername" 
                    class="form-input" 
                    placeholder="Choose a username" 
                    required
                    autocomplete="username"
                    minlength="2"
                    maxlength="30"
                >
            </div>

            <div class="form-group">
                <label class="form-label" for="signupEmail">Email</label>
                <input 
                    type="email" 
                    id="signupEmail" 
                    class="form-input" 
                    placeholder="your@email.com" 
                    required
                    autocomplete="email"
                >
            </div>

            <div class="form-group">
                <label class="form-label" for="signupPassword">Password</label>
                <input 
                    type="password" 
                    id="signupPassword" 
                    class="form-input" 
                    placeholder="At least 6 characters" 
                    required
                    autocomplete="new-password"
                    minlength="6"
                >
            </div>

            <div class="form-group">
                <label class="form-label" for="signupConfirmPassword">Confirm Password</label>
                <input 
                    type="password" 
                    id="signupConfirmPassword" 
                    class="form-input" 
                    placeholder="Confirm your password" 
                    required
                    autocomplete="new-password"
                >
            </div>

            <button type="submit" class="submit-btn">Create Account</button>
        </form>

        <!-- Toggle Auth Mode -->
        <div class="auth-toggle">
            <span id="toggleText">Don't have an account?</span>
            <a id="toggleAuthBtn">Sign up</a>
        </div>
    </div>

    <!-- Scripts -->
    <script src="/scripts/auth.js"></script>
    <script src="/scripts/login.js"></script>
</body>
</html>
